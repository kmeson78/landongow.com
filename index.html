<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landon L Gow | Author of the Arcolith Trilogy</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <meta name="keywords" content="Landon L Gow, Landon Gow, Landon Leroy Gow, Arcolith Trilogy, Dissociation Provocations, This Flag Raised in Rebellion, books, music, author">
  <meta name="description" content="Official website of Landon L Gow, author of the Arcolith Trilogy, Dissociation Provocations, and This Flag Raised in Rebellion.">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      color: #fff;
      background-color: #000;
      background-image: url("site_background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .hidden-seo {
      position: absolute;
      left: -9999px;
      top: -9999px;
    }

    .hero {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      overflow-x: auto;
      padding: 0 2rem;
      box-sizing: border-box;
    }

    .products {
      display: flex;
      gap: 2rem;
      align-items: stretch;
      flex-shrink: 0;
    }

    .products > a,
    .album-stack a,
    .arcolith-wrap {
      display: inline-block;
      perspective: 900px;
      perspective-origin: center;
    }

    .products > a img,
    .arcolith-wrap > a img {
      height: 345px;
      width: auto;
      border-radius: 4px;
      transition: transform 0.45s ease;
      display: block;
    }

    .album-stack {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      align-items: center;
    }

    .album-stack a img {
      width: 160px;
      border-radius: 4px;
      transition: transform 0.45s ease;
      display: block;
    }

    .arcolith-wrap {
      position: relative;
    }

    .trilogy-button-container {
      position: absolute;
      left: 50%;
      top: calc(100% + 32px);
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .trilogy-button {
      display: inline-block;
      opacity: 0.78;
      transition: opacity 0.2s ease;
      max-width: 180px;
    }

    .trilogy-button:hover {
      opacity: 1;
    }

    .trilogy-button img {
      width: 100%;
      display: block;
    }

    .products > a:hover img,
    .album-stack a:hover img,
    .arcolith-wrap > a:hover img {
      transform: translateX(10px) rotateY(-8deg) scale(1.35);
    }

    .contact {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 100vh;
      padding-bottom: 4rem;
    }

    .logo-container img {
      max-width: 300px;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 300px;
    }

    input, textarea, button {
      padding: 0.5rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 4px;
    }

    button {
      background: #444;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }
  </style>
</head>

<body>

<div class="hidden-seo">
  Landon L Gow, Arcolith Trilogy
</div>

<div class="hero">
  <div class="products">

    <a href="https://www.amazon.com/dp/B0FVTB26S2" target="_blank">
      <img src="book3.png">
    </a>

    <div class="album-stack">
      <a href="https://elasticstage.com/amnad/releases/before-i-forget-album" target="_blank">
        <img src="album2.png">
      </a>
      <a href="https://elasticstage.com/amnad/releases/that-which-does-not-kill-you-circles-back-again-and-again-album" target="_blank">
        <img src="album3.png">
      </a>
    </div>

    <div class="arcolith-wrap">
      <a href="https://www.amazon.com/dp/B0GWX8HHRP" target="_blank">
        <img src="book.png">
      </a>

      <div class="trilogy-button-container">
        <a href="arcolith.html" class="trilogy-button">
          <img src="seriesbutton.png">
        </a>
      </div>
    </div>

    <div class="album-stack">
      <a href="https://elasticstage.com/amnad/releases/shadows-fall-album" target="_blank">
        <img src="album.png">
      </a>
      <a href="https://allmynightsaredreams.bandcamp.com/album/once-through" target="_blank">
        <img src="album4.png">
      </a>
    </div>

    <a href="https://www.amazon.com/dp/B0G29WXKV4" target="_blank">
      <img src="book2.png">
    </a>

  </div>
</div>

<div class="contact">
  <div class="logo-container">
    <img src="wilt_josey_fixed.png">
  </div>

  <div class="logo-container">
    <img src="logo.png">
  </div>

  <form action="https://formspree.io/f/xvzzzele" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" rows="5" placeholder="Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</div>

</body>
</html>
