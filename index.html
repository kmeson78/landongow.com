<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landon L Gow | Author of the Arcolith Trilogy</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <meta name="keywords" content="Landon L Gow, Landon Gow, Landon Leroy Gow, Arcolith Trilogy, Dissociation Provocations, This Flag Raised in Rebellion, books, music, author">
  <meta name="description" content="Official website of Landon L Gow, author of the Arcolith Trilogy, Dissociation Provocations, and This Flag Raised in Rebellion. Explore books, music, and contact information.">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      color: #fff;
      background-color: #000;
      background-image: url("site_background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .hidden-seo {
      position: absolute;
      left: -9999px;
      top: -9999px;
    }

    .hero {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      overflow-x: auto;
      padding: 0 2rem;
      box-sizing: border-box;
    }

    /* REVERSE VIGNETTE */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(
          ellipse at center,
          rgba(255,255,255,0.08) 0%,
          rgba(255,255,255,0.04) 20%,
          rgba(255,255,255,0.015) 35%,
          rgba(0,0,0,0) 55%
        ),
        radial-gradient(
          ellipse at center,
          rgba(0,0,0,0) 40%,
          rgba(0,0,0,0.25) 65%,
          rgba(0,0,0,0.55) 100%
        );
      filter: blur(20px);
    }

    .hero::-webkit-scrollbar {
      height: 8px;
    }

    .hero::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }

    .products {
      display: flex;
      gap: 2rem;
      align-items: stretch;
      flex-shrink: 0;
      padding-left: 0;
      position: relative;
      z-index: 1;
    }

    .products > a,
    .album-stack a,
    .arcolith-wrap {
      display: inline-block;
      perspective: 900px;
      perspective-origin: center;
    }

    .products > a img {
      height: 345px;
      width: auto;
      max-width: 90vw;
      border-radius: 4px;
      transition: transform 0.45s ease;
      display: block;
      flex-shrink: 0;
      background: #000;
      transform-origin: 50% 50%;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .products > a img.no-border {
      border: none;
      background: transparent;
    }

    .album-stack {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      gap: 2rem;
    }

    .album-stack a img {
      width: 160px;
      height: auto;
      border-radius: 4px;
      transition: transform 0.45s ease;
      display: block;
      background: transparent;
      transform-origin: 50% 50%;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .arcolith-wrap {
      position: relative;
      z-index: 1;
    }

    .arcolith-wrap > a img {
      height: 345px;
      width: auto;
      max-width: 90vw;
      border-radius: 4px;
      transition: transform 0.45s ease;
      display: block;
      flex-shrink: 0;
      background: transparent;
      transform-origin: 50% 50%;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .trilogy-button-container {
      position: absolute;
      left: 50%;
      top: calc(100% + 32px);
      transform: translateX(-50%);
      z-index: 2;
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .trilogy-button {
      pointer-events: auto;
      appearance: none;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      display: inline-flex;
      opacity: 0.78;
      transition: opacity 0.2s ease;
      max-width: 100%;
    }

    .trilogy-button:hover {
      opacity: 1;
    }

    .trilogy-button img {
      display: block;
      width: 100%;
      max-width: 180px;
      height: auto;
    }

    @keyframes hoverBreath {
      0%   { transform: translateX(10px) rotateY(-8deg) translateZ(30px) scale(1.35); }
      50%  { transform: translateX(12px) rotateY(-9deg) translateZ(32px) scale(1.36); }
      100% { transform: translateX(10px) rotateY(-8deg) translateZ(30px) scale(1.35); }
    }

    .products > a:hover img,
    .album-stack a:hover img,
    .arcolith-wrap > a:hover img {
      position: relative;
      z-index: 10;
      will-change: transform;
      transform: translateX(10px) rotateY(-8deg) translateZ(30px) scale(1.35);
      animation: hoverBreath 1.8s ease-in-out infinite;
    }

    @media (hover: none) {
      .products > a:hover img,
      .album-stack a:hover img,
      .arcolith-wrap > a:hover img {
        transform: none;
        animation: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .products > a img,
      .album-stack a img,
      .arcolith-wrap > a img {
        transition: none;
      }

      .products > a:hover img,
      .album-stack a:hover img,
      .arcolith-wrap > a:hover img {
        animation: none;
      }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 2rem;
      box-sizing: border-box;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 720px;
      background: rgba(0, 0, 0, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 1.25rem;
      box-sizing: border-box;
    }
